body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Roboto,sans-serif;margin:0;padding:20px 12px 48px;line-height:1.45;}
.wrap{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}
header h1{font-size:21px;margin:0;font-weight:650;}
header p{margin:4px 0 0;color:var(--sub);font-size:13px;}
.filtros{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.filtros .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--sub);font-weight:700;margin-right:2px;}
.pill{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:99px;padding:4px 12px;font-size:13px;font-weight:600;cursor:pointer;}
.pill.on{background:var(--acc);border-color:var(--acc);color:#fff;}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;}
.hint{font-size:12.5px;color:var(--sub);margin:0 2px;}
.row{display:grid;grid-template-columns:minmax(0,1fr) 96px 96px;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:none;}
.row .nm{font-size:13.5px;font-weight:600;min-width:0;}
.row .nm small{display:block;font-weight:400;color:var(--sub);font-size:12px;font-variant-numeric:tabular-nums;}
.spark{display:flex;align-items:flex-end;gap:2px;height:30px;}
.spark i{flex:1;background:var(--bar);border-radius:1.5px 1.5px 0 0;display:block;min-height:1px;}
.spark i.dim{opacity:.25;}
.spark i.p{opacity:.5;}
.mg{text-align:right;font-size:12px;color:var(--sub);font-variant-numeric:tabular-nums;}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;margin-top:2px;}
.t-up{background:var(--verde-bg);color:var(--verde);}
.t-dn{background:var(--rojo-bg);color:var(--rojo);}
.t-fl{background:var(--neut-bg);color:var(--neut);}
footer{font-size:11.5px;color:var(--sub);text-align:center;}
footer a{color:var(--acc);}
</style>

const fmt=n=>"$"+Math.round(n).toLocaleString("en-US");
const fmtk=n=>n>=1e6?("$"+(n/1e6).toFixed(2)+"M"):("$"+Math.round(n/1000).toLocaleString("en-US")+"k");
const esParcial=(a,m)=>DATA.parcial&&+a===DATA.parcial.y&&+m===DATA.parcial.m;
function pills(){
  const fa=$("fAnio"); fa.querySelectorAll("button").forEach(b=>b.remove());
  anios.forEach(a=>{const b=document.createElement("button");b.className="pill"+(a===selA?" on":"");b.textContent=a;
    b.onclick=()=>{selA=a; if(selM!=="T"&&!DATA.anios[selA][selM])selM="T"; render();}; fa.appendChild(b);});
  const fm=$("fMes"); fm.querySelectorAll("button").forEach(b=>b.remove());
  ["T",...Object.keys(DATA.anios[selA])].forEach(m=>{const b=document.createElement("button");
    b.className="pill"+(m===selM?" on":""); b.textContent=(m==="T"?"Todos":MES[+m]);
    b.onclick=()=>{selM=m;render();}; fm.appendChild(b);});
}
function mv(o,s){const x=o.sub[s]; return x&&x[0]?x[1]/x[0]*100:null;}
function render(){
  pills();
  const Y=DATA.anios[selA]; const meses=Object.keys(Y);
  // venta por subgrupo de la seleccion
  const agg={};
  const src = selM==="T" ? meses : [selM];
  src.forEach(m=>{for(const s in Y[m].sub){if(!agg[s])agg[s]=[0,0]; agg[s][0]+=Y[m].sub[s][0]; agg[s][1]+=Y[m].sub[s][1];}});
  const tops=Object.entries(agg).sort((a,b)=>b[1][0]-a[1][0]).slice(0,12);
  const per = selM==="T"?selA:MES[+selM]+" "+selA;
  $("hint").textContent = "Barritas = venta mensual de "+selA+(selM!=="T"?" (mes elegido resaltado)":"")+
    ". Píldora = cómo se movió el margen"+(selM==="T"?" del primer al último mes del año.":" vs el mes anterior.");
  const cont=$("lista"); cont.innerHTML="";
  tops.forEach(([s,vg])=>{
    // spark del año
    const vals=meses.map(m=>Y[m].sub[s]?Y[m].sub[s][0]:0);
    const mx=Math.max(...vals,1);
    let spark='<div class="spark">';
    meses.forEach((m,i)=>{const dim=(selM!=="T"&&m!==selM);
      spark+='<i class="'+(dim?"dim":(esParcial(selA,m)?"p":""))+'" style="height:'+Math.max(3,Math.round(vals[i]/mx*100))+'%"></i>';});
    spark+='</div>';
    // pildora de margen
    let mgHtml="";
    if(selM==="T"){
      const con=meses.filter(m=>mv(Y[m],s)!==null);
      if(con.length>=2){
        const a=mv(Y[con[0]],s), b=mv(Y[con[con.length-1]],s), d=b-a;
        const cls=d>1.5?"t-up":(d<-1.5?"t-dn":"t-fl"); const arr=d>1.5?"▲":(d<-1.5?"▼":"≈");
        mgHtml=a.toFixed(1)+"% → "+b.toFixed(1)+"%<br><span class='tag "+cls+"'>"+arr+" "+(d>0?"+":"")+d.toFixed(1)+"</span>";
      } else if(con.length===1){ mgHtml=mv(Y[con[0]],s).toFixed(1)+"%"; }
    } else {
      const b=agg[s][0]?agg[s][1]/agg[s][0]*100:0;
      const idx=meses.indexOf(selM); let prev=null;
      for(let i=idx-1;i>=0;i--){const x=mv(Y[meses[i]],s); if(x!==null){prev=x;break;}}
      if(prev!==null){const d=b-prev; const cls=d>1.5?"t-up":(d<-1.5?"t-dn":"t-fl"); const arr=d>1.5?"▲":(d<-1.5?"▼":"≈");
        mgHtml=b.toFixed(1)+"%<br><span class='tag "+cls+"'>"+arr+" "+(d>0?"+":"")+d.toFixed(1)+" vs mes ant.</span>";
      } else mgHtml=b.toFixed(1)+"%";
    }
    const row=document.createElement("div"); row.className="row";
    row.innerHTML='<div class="nm">'+s+'<small>'+fmtk(vg[0])+' en '+per+(selM!=="T"&&esParcial(selA,selM)?" (parcial)":"")+'</small></div>'+spark+'<div class="mg">'+mgHtml+'</div>';
    cont.appendChild(row);
  });
}
render();
</script>

</body>
</html>
